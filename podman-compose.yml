---
# Podman Compose – Flink Clickstream Event Reordering local dev stack
#
# Services:
#   kafka        – apache/kafka:latest  KRaft mode (no Zookeeper), native linux/arm64
#                  Internal listener : kafka:9092   (used by Flink containers)
#                  External listener : localhost:9094 (used by the Python producer on the host)
#   kafka-ui     – Provectus Kafka-UI  → http://localhost:8080
#   jobmanager   – apache/flink:2.2-java11 JobManager → http://localhost:8081  (native arm64)
#   taskmanager  – apache/flink:2.2-java11 TaskManager (4 slots)              (native arm64)
#
# Notes:
#   • platform is set via the PLATFORM env var (auto-detected by the Makefile).
#     It defaults to linux/amd64 if not set.  Override: PLATFORM=linux/arm64 make up
#   • depends_on uses simple list form (no condition:) because podman-compose
#     does not support service_healthy conditions.  Readiness is handled by
#     the wait-for-kafka / wait-for-flink targets in the Makefile instead.
#
# Run with:  podman-compose up -d
# Tear down:  podman-compose down -v

version: "3.8"

networks:
  clickstream-net:
    driver: bridge

volumes:
  kafka-data:
  prometheus-data:
  grafana-data:

# ---------------------------------------------------------------------------
# Re-usable YAML anchors
# ---------------------------------------------------------------------------
x-flink-common: &flink-common
  #  image: apache/flink:2.2-java11
  image: flink:2.3-SK
  platform: ${PLATFORM:-linux/amd64}
  networks:
    - clickstream-net
  volumes:
    # Mount the fat-JAR directory so Flink can load the job without a separate copy step.
    - ./target:/opt/flink/usrlib:ro

# ---------------------------------------------------------------------------
services:
# ---------------------------------------------------------------------------

  # ---------- Kafka (KRaft – single broker) ----------
  kafka:
    # Official Apache Kafka image – proper multi-arch (linux/arm64 + linux/amd64),
    # stable tags, KRaft built-in (no Zookeeper needed).
    image: apache/kafka:latest
    platform: ${PLATFORM:-linux/amd64}
    container_name: clickstream-kafka
    hostname: kafka
    networks:
      - clickstream-net
    ports:
      # External listener for host-machine producers/consumers
      - "9094:9094"
    environment:
      # KRaft identity – apache/kafka uses plain property names (no KAFKA_CFG_ prefix)
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # Three listeners:
      #   PLAINTEXT  – intra-container traffic (Flink → Kafka)
      #   CONTROLLER – KRaft controller traffic (internal only)
      #   EXTERNAL   – host-machine traffic (Python producer, kcat, console consumer)
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Sensible defaults for a dev broker
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "24"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # Fixed cluster ID required for KRaft formatting (base64url-encoded UUID)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "/opt/kafka/bin/kafka-topics.sh --list --bootstrap-server localhost:9092"
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  # ---------- Kafka UI (optional but useful for inspection) ----------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    platform: ${PLATFORM:-linux/amd64}
    container_name: clickstream-kafka-ui
    hostname: kafka-ui
    networks:
      - clickstream-net
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    depends_on:
      - kafka

  # ---------- Flink JobManager ----------
  jobmanager:
    <<: *flink-common
    container_name: clickstream-jobmanager
    hostname: jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      # Flink configuration (written to flink-conf.yaml by the entrypoint)
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 1600m
        parallelism.default: 2
        state.backend.type: rocksdb
        state.backend.incremental: true
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 600000
        state.backend.rocksdb.metrics.cur-size-active-mem-table: true
        state.backend.rocksdb.metrics.cur-size-all-mem-tables: true
        state.backend.rocksdb.metrics.size-all-mem-tables: true
        state.backend.rocksdb.metrics.num-entries-active-mem-table: true
        state.backend.rocksdb.metrics.num-entries-imm-mem-tables: true
        state.backend.rocksdb.metrics.num-deletes-active-mem-table: true
        state.backend.rocksdb.metrics.num-deletes-imm-mem-tables: true
        state.backend.rocksdb.metrics.estimate-num-keys: true
        state.backend.rocksdb.metrics.estimate-live-data-size: true
        state.backend.rocksdb.metrics.total-sst-files-size: true
        state.backend.rocksdb.metrics.live-sst-files-size: true
        state.backend.rocksdb.metrics.estimate-pending-compaction-bytes: true
        state.backend.rocksdb.metrics.num-running-compactions: true
        state.backend.rocksdb.metrics.num-running-flushes: true
        state.backend.rocksdb.metrics.actual-delayed-write-rate: true
        state.backend.rocksdb.metrics.background-errors: true
        state.backend.rocksdb.metrics.block-cache-capacity: true
        state.backend.rocksdb.metrics.block-cache-usage: true
        state.backend.rocksdb.metrics.block-cache-pinned-usage: true
        state.backend.rocksdb.metrics.column-family-as-variable: true
        rest.flamegraph.enabled: true
        state.backend.rocksdb.options-factory: com.example.clickstream.AggressiveCompactionOptions
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
      # Application-level env vars read by ClickStreamJob via System.getenv()
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_INPUT_TOPIC: "clickstream"
      KAFKA_OUTPUT_TOPIC: "checkout-session"
      KAFKA_CONSUMER_GROUP: "clickstream-reordering"
    depends_on:
      - kafka

  # ---------- Flink TaskManager ----------
  taskmanager:
    <<: *flink-common
    container_name: clickstream-taskmanager
    hostname: taskmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.memory.process.size: 16g
        taskmanager.memory.task.heap.size: 2g
        taskmanager.numberOfTaskSlots: 4
        state.backend.type: rocksdb
        state.backend.incremental: true
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 600000
        state.backend.rocksdb.writebuffer.count: 10
        state.backend.rocksdb.writebuffer.number-to-merge: 2
        state.backend.rocksdb.writebuffer.size: 16777216
        state.backend.rocksdb.metrics.cur-size-active-mem-table: true
        state.backend.rocksdb.metrics.cur-size-all-mem-tables: true
        state.backend.rocksdb.metrics.size-all-mem-tables: true
        state.backend.rocksdb.metrics.num-entries-active-mem-table: true
        state.backend.rocksdb.metrics.num-entries-imm-mem-tables: true
        state.backend.rocksdb.metrics.num-deletes-active-mem-table: true
        state.backend.rocksdb.metrics.num-deletes-imm-mem-tables: true
        state.backend.rocksdb.metrics.estimate-num-keys: true
        state.backend.rocksdb.metrics.estimate-live-data-size: true
        state.backend.rocksdb.metrics.total-sst-files-size: true
        state.backend.rocksdb.metrics.live-sst-files-size: true
        state.backend.rocksdb.metrics.estimate-pending-compaction-bytes: true
        state.backend.rocksdb.metrics.num-running-compactions: true
        state.backend.rocksdb.metrics.num-running-flushes: true
        state.backend.rocksdb.metrics.actual-delayed-write-rate: true
        state.backend.rocksdb.metrics.background-errors: true
        state.backend.rocksdb.metrics.block-cache-capacity: true
        state.backend.rocksdb.metrics.block-cache-usage: true
        state.backend.rocksdb.metrics.block-cache-pinned-usage: true
        state.backend.rocksdb.metrics.column-family-as-variable: true
        rest.flamegraph.enabled: true
        state.backend.rocksdb.log.level: INFO_LEVEL
        state.backend.rocksdb.log.dir: /tmp/flink-rocksdb-logs
        state.backend.rocksdb.log.max-file-size: 67108864
        state.backend.rocksdb.log.file-num: 4
        state.backend.rocksdb.options-factory: com.example.clickstream.AggressiveCompactionOptions
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
      # Same app-level vars needed because user code runs on the TaskManager JVM
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_INPUT_TOPIC: "clickstream"
      KAFKA_OUTPUT_TOPIC: "checkout-session"
      KAFKA_CONSUMER_GROUP: "clickstream-reordering"
    depends_on:
      - jobmanager

  # ---------- Kafka Exporter (topic / consumer-group lag metrics for Prometheus) ----------
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    platform: ${PLATFORM:-linux/amd64}
    container_name: clickstream-kafka-exporter
    hostname: kafka-exporter
    networks:
      - clickstream-net
    command:
      - --kafka.server=kafka:9092
      - --kafka.version=3.0.0
    depends_on:
      - kafka

  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:latest
    platform: ${PLATFORM:-linux/amd64}
    container_name: clickstream-prometheus
    hostname: prometheus
    networks:
      - clickstream-net
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
    depends_on:
      - kafka-exporter
      - jobmanager
      - taskmanager

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana:latest
    platform: ${PLATFORM:-linux/amd64}
    container_name: clickstream-grafana
    hostname: grafana
    networks:
      - clickstream-net
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
